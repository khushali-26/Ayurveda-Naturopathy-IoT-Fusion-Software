<!DOCTYPE html>
<html>
<head>
<title>Assessment History</title>
</head>
<body>

<h1>Assessment History</h1>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Vata</th>
<th>Pitta</th>
<th>Kapha</th>
<th>Wellness</th>
<th>Dosha</th>
</tr>

{% for row in records %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
<td>{{ row[6] }}</td>
<td>{{ row[7] }}</td>
<td>{{ row[8] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
