<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Registration</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f8f4;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:30px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#2e7d32;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            margin-bottom:25px;
            color:#555;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            margin-top:25px;
            width:100%;
            padding:12px;
            background:#2e7d32;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1b5e20;
        }

        nav{
            background:#2e7d32;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:5px 10px;
            display:inline-block;
            font-weight:bold;
        }

        nav a:hover{
            text-decoration:underline;
        }

        footer{
            background:#2e7d32;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }

        @media (max-width: 768px){

            .container{
                width:95%;
                padding:15px;
            }

            h1{
                font-size:24px;
            }

            h2{
                font-size:20px;
            }

            .steps{
                flex-direction:column;
                align-items:center;
            }

            .step{
                width:100%;
                margin-bottom:15px;
            }

            nav a{
                display:block;
                margin:10px 0;
            }

        } 

    </style>

</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/assessment">Assessment</a>
    <a href="/history">History</a>
    <a href="/about">About</a>
    <a href="/iot">IoT Architecture</a>
</nav>


<div class="container">

    <h1>Assessment Registration</h1>

    <p>
        Please provide the following information before beginning the wellness assessment.
    </p>

    <form action="/questionnaire" method="POST">

        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="1" max="120" required>

        <label for="gender">Gender</label>
        <select id="gender" name="gender">
            <option>Select Gender</option>
            <option>Female</option>
            <option>Male</option>
            <option>Other</option>
        </select>

        <label for="email">Email (Optional)</label>
        <input type="email" id="email">

        <button type="submit">
            Proceed to Questionnaire
        </button>

    </form>

</div>

<footer>
    <p>
        © 2026 Smart Ayurvedic & Naturopathic Wellness Assessment System
    </p>
</footer>

</body>
</html>
